<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — Andromeda Platform</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --bg:#0a0a0f; --surface:#12121a; --border:rgba(255,255,255,0.08); --accent:#6366f1; --text:#f1f5f9; --muted:#94a3b8; --error:#ef4444; }
    body { font-family:'Outfit',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

    /* ── NAV ── */
    .nav { display:flex; align-items:center; justify-content:space-between; padding:14px 24px; border-bottom:1px solid var(--border); }
    .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; color:var(--text); font-weight:700; font-size:1rem; }
    .nav-logo span { font-size:22px; }
    .nav-links { display:flex; gap:12px; align-items:center; }
    .nav-links a { color:var(--muted); text-decoration:none; font-size:0.9rem; padding:6px 14px; border-radius:8px; transition:background 0.15s,color 0.15s; }
    .nav-links a:hover { background:rgba(255,255,255,0.06); color:var(--text); }
    .nav-links .btn-primary { background:var(--accent); color:#fff; font-weight:600; }
    .nav-links .btn-primary:hover { background:#4f46e5; }

    /* ── FORM ── */
    .page { flex:1; display:flex; align-items:center; justify-content:center; padding:40px 24px; }
    .card { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:40px 36px; width:100%; max-width:420px; }
    .card-header { text-align:center; margin-bottom:32px; }
    .card-header .icon { font-size:36px; margin-bottom:12px; }
    .card-header h1 { font-size:1.6rem; font-weight:700; }
    .card-header p { color:var(--muted); font-size:0.9rem; margin-top:6px; }
    .form-group { margin-bottom:18px; }
    label { display:block; font-size:0.85rem; font-weight:600; color:var(--muted); margin-bottom:6px; }
    input { width:100%; padding:12px 14px; background:rgba(255,255,255,0.05); border:1px solid var(--border); border-radius:10px; color:var(--text); font-family:'Outfit',sans-serif; font-size:0.95rem; outline:none; transition:border-color 0.2s; }
    input:focus { border-color:var(--accent); }
    .btn { width:100%; padding:13px; background:var(--accent); color:#fff; border:none; border-radius:10px; font-family:'Outfit',sans-serif; font-size:1rem; font-weight:600; cursor:pointer; transition:background 0.2s; margin-top:8px; }
    .btn:hover { background:#4f46e5; }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }
    .error-msg { background:rgba(239,68,68,0.1); border:1px solid rgba(239,68,68,0.3); color:var(--error); padding:10px 14px; border-radius:8px; font-size:0.875rem; margin-bottom:16px; display:none; }
    .footer-link { text-align:center; margin-top:20px; font-size:0.875rem; color:var(--muted); }
    .footer-link a { color:var(--accent); text-decoration:none; font-weight:600; }
    .footer-link a:hover { text-decoration:underline; }
    .divider { border:none; border-top:1px solid var(--border); margin:20px 0; }
  </style>
</head>
<body>

  <nav class="nav">
    <a href="/" class="nav-logo"><span>🌌</span> Andromeda Platform</a>
    <div class="nav-links">
      <a href="/register/">Crear cuenta</a>
      <a href="/register/" class="btn-primary">Empezar gratis</a>
    </div>
  </nav>

  <div class="page">
    <div class="card">
      <div class="card-header">
        <div class="icon">👤</div>
        <h1>Iniciar sesión</h1>
        <p>Accede a tu cuenta de Andromeda Platform</p>
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" placeholder="tu@email.com" required autocomplete="email" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn" id="submitBtn">Entrar</button>
      </form>

      <hr class="divider" />
      <div class="footer-link">¿No tienes cuenta? <a href="/register/">Regístrate gratis</a></div>
    </div>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('andromeda_token');
    if (token) window.location.href = '/dashboard/';

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      const errEl = document.getElementById('errorMsg');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            password: document.getElementById('password').value
          })
        });
        const data = await res.json();
        if (data.success) {
          localStorage.setItem('andromeda_token', data.token);
          localStorage.setItem('andromeda_user', JSON.stringify(data.user));
          const role = data.user?.role;
          window.location.href = role === 'admin' ? '/admin/users/' : '/dashboard/';
        } else {
          errEl.textContent = data.error || 'Error al iniciar sesión';
          errEl.style.display = 'block';
          btn.disabled = false;
          btn.textContent = 'Entrar';
        }
      } catch {
        errEl.textContent = 'Error de conexión. Intenta de nuevo.';
        errEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Entrar';
      }
    });
  </script>
</body>
</html>
